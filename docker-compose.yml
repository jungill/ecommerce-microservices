version: '3.8'

services:

  # ── product-service ──────────────────────────────────────────────────────────
  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service
    ports:
      - "8081:8081"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── order-service ─────────────────────────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      # Dans Docker, on utilise le nom du service (pas localhost)
      - PRODUCT_SERVICE_URL=http://product-service:8081
    depends_on:
      - product-service
    networks:
      - ecommerce-network

  # ── gateway-service ───────────────────────────────────────────────────────────
  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      # Dans Docker, on utilise les noms des services
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - ORDER_SERVICE_URL=http://order-service:8082
    depends_on:
      - product-service
      - order-service
    networks:
      - ecommerce-network

  # ── frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend
    ports:
      - "4200:80"   # Nginx écoute sur 80, on expose sur 4200
    depends_on:
      - gateway-service
    networks:
      - ecommerce-network

# ── Réseau partagé entre tous les services ────────────────────────────────────
networks:
  ecommerce-network:
    driver: bridge
